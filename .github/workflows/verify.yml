name: Verify (lint + token gate + schema parity)

# Fast CI gates that don't need a deploy-preview. Catches:
#  - ESLint errors (incl. brik-tokens/no-invented-tokens — inline `var(--*)`
#    references that aren't canonical / declared / allowlisted)
#  - Token-lint script: invented-token check + service-token family rule
#    (brikdesigns#116) across .ts/.tsx/.css
#  - Token-lint self-test: fixture-based regression tests for the family rule
#  - Service-URL lint: hardcoded /services/<slug> URLs must use the canonical
#    Supabase short-form slugs (brikdesigns#113)
#  - Heading title-case lint: hardcoded marketing headings must follow the
#    title-case standard (brik-bds#910); + fixture-based self-test (brikdesigns#491)
#  - Schema parity: src/types/supabase.ts ↔ src/lib/admin/*.ts SCHEMA ↔
#    src/app/(chromeless)/admin/services/_components/field-configs.ts
#
# Sibling to a11y.yml (which waits for Netlify) and visual-parity.yml
# (which also waits for Netlify). This one runs on every push and PR.

on:
  pull_request:
    branches:
      - main
      - staging
    # Skip on doc-only / workflow-only changes. Any file that feeds lint,
    # token-gate, or schema-parity must be listed here. Push-to-staging/main
    # (merge commits) always runs — no paths filter on push.
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'supabase/**'
      - 'eslint.config.mjs'
      - 'next.config.*'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
      - staging

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      packages: read
    env:
      PACKAGES_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint (incl. brik-tokens rule)
        run: npm run lint

      - name: Token lint (.css + .ts + .tsx)
        run: npm run lint:tokens

      - name: Token lint — self-test (family rule fixtures)
        run: npm run test:lint:tokens

      - name: Service-URL lint (no hardcoded long-form Webflow slugs)
        run: npm run lint:service-urls

      - name: Heading title-case lint (marketing JSX)
        run: npm run lint:heading-case

      - name: Heading title-case lint — self-test (fixtures)
        run: npm run test:lint:heading-case
