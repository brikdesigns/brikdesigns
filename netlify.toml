[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_PUBLIC_ENV = "production"

# Branch deploys (staging + any other non-production branch).
# Per-context Supabase URL/keys, SITE_URL, etc. are configured in the Netlify
# UI under Environment variables, scoped to "Branch deploys".
# Note: Netlify silently ignores per-context [[headers]] blocks despite the
# docs claiming support — the X-Robots-Tag is set from next.config.mjs
# instead, gated on NEXT_PUBLIC_ENV !== "production".
[context.branch-deploy.environment]
  NEXT_PUBLIC_ENV = "staging"

[context.deploy-preview.environment]
  NEXT_PUBLIC_ENV = "preview"

# Next.js on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# SEO redirects — Webflow URL structure to new structure
# These ensure Google ranking continuity after migration

[[redirects]]
  from = "/detail_service/*"
  to = "/services/:splat"
  status = 301

[[redirects]]
  from = "/detail_service-lines/*"
  to = "/services/:splat"
  status = 301

[[redirects]]
  from = "/detail_customer-story/*"
  to = "/customer-stories/:splat"
  status = 301

[[redirects]]
  from = "/detail_post/*"
  to = "/blog/:splat"
  status = 301

[[redirects]]
  from = "/detail_pricing/*"
  to = "/plans"
  status = 301

[[redirects]]
  from = "/customers/*"
  to = "/industries/:splat"
  status = 301

[[redirects]]
  from = "/detail_customers/*"
  to = "/industries/:splat"
  status = 301

[[redirects]]
  from = "/detail_templates/*"
  to = "/templates/:splat"
  status = 301

# Legacy short-slug category URLs → canonical long slugs
[[redirects]]
  from = "/services/brand"
  to = "/services/brand-design"
  status = 301

[[redirects]]
  from = "/services/brand/*"
  to = "/services/brand-design/:splat"
  status = 301

[[redirects]]
  from = "/services/marketing"
  to = "/services/marketing-design"
  status = 301

[[redirects]]
  from = "/services/marketing/*"
  to = "/services/marketing-design/:splat"
  status = 301

[[redirects]]
  from = "/services/information"
  to = "/services/information-design"
  status = 301

[[redirects]]
  from = "/services/information/*"
  to = "/services/information-design/:splat"
  status = 301

[[redirects]]
  from = "/services/service"
  to = "/services/back-office-design"
  status = 301

[[redirects]]
  from = "/services/service/*"
  to = "/services/back-office-design/:splat"
  status = 301

[[redirects]]
  from = "/services/product"
  to = "/services/product-design"
  status = 301

[[redirects]]
  from = "/services/product/*"
  to = "/services/product-design/:splat"
  status = 301

# Webflow service-lines URL structure → new structure
[[redirects]]
  from = "/service-lines/*"
  to = "/services/:splat"
  status = 301

# Security headers (supplement Next.js headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
